<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyBank | Dashboard</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<!-- Top navigation bar with links to user actions -->
<div class="top-nav">
    <div class="brand">MyBank</div>
    <div>
        <a href="#" id="btnFetchProfile">Profile</a>
        <a href="#" id="btnFetchBalance">Balance</a>
        <a href="#" id="btnTx">Transactions</a>
        <a href="#" id="btnLogout">Logout</a>
    </div>
</div>

<!--
  Wrapping container in a "center dashboard-center" div
  to make the entire dashboard centered vertically and horizontally.
  This improves the visual balance of the layout compared to
  being aligned only at the top of the screen.
-->
<div class="center dashboard-center">
    <div class="container">
        <!-- Welcome section shows login state or greeting -->
        <div class="card" id="welcome">
            <h2 class="section-title">Welcome</h2>
            <p class="muted" id="welcomeText">Loading…</p>
        </div>

        <!-- User profile section -->
        <div class="card" id="profileCard">
            <h2 class="section-title">Profile</h2>
            <pre id="profileJson" class="muted" style="white-space:pre-wrap"></pre>
        </div>

        <!-- Balance information -->
        <div class="card" id="balanceCard">
            <h2 class="section-title">Balance</h2>
            <div id="balanceText" class="muted">—</div>
        </div>

        <!-- Recent transaction history -->
        <div class="card" id="txCard">
            <h2 class="section-title">Recent transactions</h2>
            <div id="txBody" class="muted">—</div>
        </div>
    </div>
</div>

<!-- JavaScript file handling dashboard logic -->
<script src="/customer.js"></script>
</body>
</html>
