<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyBank | Teller dashboard</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="center">
    <div class="container">

        <!-- Header / welcome -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div>
                <h1 class="card-title" style="margin-bottom:2px;">Teller dashboard</h1>
                <p class="card-subtitle" id="tellerWelcome">Loading teller profile…</p>
            </div>
            <button id="tellerLogoutBtn" class="btn btn-ghost">Logout</button>
        </div>

        <!-- Customers list -->
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <h2 class="section-title" style="margin:0;">Customer list</h2>
                <button id="btnLoadTellerCustomers" class="btn btn-secondary">Load customers</button>
            </div>
            <div id="tellerCustomersWrap" class="mt-8">
                <p class="help">Click “Load customers” to view customers you can assist.</p>
            </div>
        </div>

        <!-- Process deposit -->
        <div class="card">
            <h2 class="section-title" style="margin-top:0;">Process deposit</h2>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                <input id="depAccountId"
                       type="number"
                       min="1"
                       placeholder="Account ID"
                       style="max-width:180px;">
                <input id="depAmount"
                       type="number"
                       min="0"
                       step="0.01"
                       placeholder="Amount"
                       style="max-width:160px;">
                <button id="btnDep" class="btn btn-primary">Deposit</button>
                <span id="depMsg" class="help"></span>
            </div>
        </div>

        <!-- Process withdraw -->
        <div class="card">
            <h2 class="section-title" style="margin-top:0;">Process withdraw</h2>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                <input id="wdAccountId"
                       type="number"
                       min="1"
                       placeholder="Account ID"
                       style="max-width:180px;">
                <input id="wdAmount"
                       type="number"
                       min="0"
                       step="0.01"
                       placeholder="Amount"
                       style="max-width:160px;">
                <button id="btnWd" class="btn btn-primary">Withdraw</button>
                <span id="wdMsg" class="help"></span>
            </div>
        </div>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const sessionRaw = localStorage.getItem("tellerSession");
    if (!sessionRaw) {
        window.location.href = "teller-login.html";
        return;
    }

    let session;
    try { session = JSON.parse(sessionRaw); } catch { session = null; }

    const welcome = document.getElementById("tellerWelcome");
    if (session && (session.firstName || session.lastName)) {
        const name = [session.firstName, session.lastName].filter(Boolean).join(" ");
        welcome.textContent = `Signed in as ${name || "Teller"} (${session.email || ""})`;
    } else {
        welcome.textContent = "Signed in as Teller";
    }

    // Logout
    document.getElementById("tellerLogoutBtn").addEventListener("click", () => {
        localStorage.removeItem("tellerSession");
        window.location.href = "teller-login.html";
    });

    // Load customers visible to teller
    const customersWrap = document.getElementById("tellerCustomersWrap");
    document.getElementById("btnLoadTellerCustomers").addEventListener("click", async () => {
        customersWrap.innerHTML = "<p class='help'>Loading customers…</p>";
        try {
            const res = await fetch("/teller/customers");
            const json = await res.json().catch(() => null);

            if (!res.ok || !json || json.status !== "success" || !Array.isArray(json.data)) {
                const msg = (json && json.message) || "Unable to load customers.";
                customersWrap.innerHTML = `<p class="error show">${msg}</p>`;
                return;
            }

            if (json.data.length === 0) {
                customersWrap.innerHTML = "<p class='help'>No customers found.</p>";
                return;
            }

            const rows = json.data.map(c => `
                <tr>
                    <td>${c.userId ?? ""}</td>
                    <td>${c.firstName ?? ""}</td>
                    <td>${c.lastName ?? ""}</td>
                    <td>${c.email ?? ""}</td>
                    <td>${c.phoneNumber ?? ""}</td>
                </tr>
            `).join("");

            customersWrap.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>First name</th>
                            <th>Last name</th>
                            <th>Email</th>
                            <th>Phone</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        } catch (e) {
            console.error(e);
            customersWrap.innerHTML = "<p class='error show'>Network error.</p>";
        }
    });

    // Deposit
    const depMsg = document.getElementById("depMsg");
    document.getElementById("btnDep").addEventListener("click", async () => {
        depMsg.textContent = "";
        const accountId = document.getElementById("depAccountId").value.trim();
        const amount = document.getElementById("depAmount").value.trim();
        if (!accountId || !amount) {
            depMsg.textContent = "Account ID and amount are required.";
            return;
        }
        try {
            const res = await fetch("/teller/deposit", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({
                    accountId: Number(accountId),
                    amount: Number(amount)
                })
            });
            const json = await res.json().catch(() => null);
            if (res.ok && json && json.status === "success") {
                depMsg.textContent = "Deposit successful.";
            } else {
                depMsg.textContent = (json && json.message) || "Deposit failed.";
            }
        } catch (e) {
            console.error(e);
            depMsg.textContent = "Network error.";
        }
    });

    // Withdraw
    const wdMsg = document.getElementById("wdMsg");
    document.getElementById("btnWd").addEventListener("click", async () => {
        wdMsg.textContent = "";
        const accountId = document.getElementById("wdAccountId").value.trim();
        const amount = document.getElementById("wdAmount").value.trim();
        if (!accountId || !amount) {
            wdMsg.textContent = "Account ID and amount are required.";
            return;
        }
        try {
            const res = await fetch("/teller/withdraw", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({
                    accountId: Number(accountId),
                    amount: Number(amount)
                })
            });
            const json = await res.json().catch(() => null);
            if (res.ok && json && json.status === "success") {
                wdMsg.textContent = "Withdraw successful.";
            } else {
                wdMsg.textContent = (json && json.message) || "Withdraw failed.";
            }
        } catch (e) {
            console.error(e);
            wdMsg.textContent = "Network error.";
        }
    });
});
</script>
</body>
</html>
