<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyBank | Admin dashboard</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="center">
    <div class="container">

        <!-- Header / welcome -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div>
                <h1 class="card-title" style="margin-bottom:2px;">Administrator dashboard</h1>
                <p class="card-subtitle" id="adminWelcome">Loading admin profile…</p>
            </div>
            <button id="adminLogoutBtn" class="btn btn-ghost">Logout</button>
        </div>

        <!-- Customers list -->
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <h2 class="section-title" style="margin:0;">All customers</h2>
                <button id="btnLoadCustomers" class="btn btn-secondary">Load customers</button>
            </div>
            <div id="customersTableWrap" class="mt-8">
                <p class="help">Click “Load customers” to view the current list.</p>
            </div>
        </div>

        <!-- Remove customer -->
        <div class="card">
            <h2 class="section-title" style="margin-top:0;">Remove customer</h2>
            <p class="help">Remove a customer by their user ID.</p>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                <input id="removeCustomerId"
                       type="number"
                       min="1"
                       placeholder="User ID"
                       style="max-width:180px;">
                <button id="btnRemoveCustomer" class="btn btn-primary">Remove</button>
                <span id="removeMsg" class="help"></span>
            </div>
        </div>

        <!-- Create teller -->
        <div class="card">
            <h2 class="section-title" style="margin-top:0;">Create teller</h2>
            <p class="help">Create a new teller account with email, password and optional branch name.</p>
            <div class="grid-2">
                <div class="field">
                    <label class="field-label" for="newTellerEmail">Email</label>
                    <input id="newTellerEmail" type="email" placeholder="teller@example.com">
                </div>
                <div class="field">
                    <label class="field-label" for="newTellerPassword">Password</label>
                    <input id="newTellerPassword" type="password" placeholder="Enter password">
                </div>
            </div>
            <div class="grid-2" style="margin-top:10px;">
                <div class="field">
                    <label class="field-label" for="newTellerBranch">Branch name (optional)</label>
                    <input id="newTellerBranch" type="text" placeholder="e.g. Downtown">
                </div>
                <div class="field">
                    <!-- spacer -->
                </div>
            </div>
            <div style="margin-top:14px;display:flex;align-items:center;gap:10px;">
                <button id="btnCreateTeller" class="btn btn-primary">Create teller</button>
                <span id="createTellerMsg" class="help"></span>
            </div>
        </div>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const sessionRaw = localStorage.getItem("adminSession");
    if (!sessionRaw) {
        // No session, go back to login
        window.location.href = "admin-login.html";
        return;
    }

    let session;
    try { session = JSON.parse(sessionRaw); } catch { session = null; }

    const welcome = document.getElementById("adminWelcome");
    if (session && (session.firstName || session.lastName)) {
        const name = [session.firstName, session.lastName].filter(Boolean).join(" ");
        welcome.textContent = `Signed in as ${name || "Administrator"} (${session.email || "admin"})`;
    } else {
        welcome.textContent = "Signed in as Administrator";
    }

    // Logout
    document.getElementById("adminLogoutBtn").addEventListener("click", () => {
        localStorage.removeItem("adminSession");
        window.location.href = "admin-login.html";
    });

    // Load customers
    const customersWrap = document.getElementById("customersTableWrap");
    document.getElementById("btnLoadCustomers").addEventListener("click", async () => {
        customersWrap.innerHTML = "<p class='help'>Loading customers…</p>";
        try {
            const res = await fetch("/admin/all_customers");
            const json = await res.json().catch(() => null);

            if (!res.ok || !json || json.status !== "success" || !Array.isArray(json.data)) {
                const msg = (json && json.message) || "Unable to load customers.";
                customersWrap.innerHTML = `<p class="error show">${msg}</p>`;
                return;
            }

            if (json.data.length === 0) {
                customersWrap.innerHTML = "<p class='help'>No customers found.</p>";
                return;
            }

            const rows = json.data.map(c => `
                <tr>
                    <td>${c.userId ?? ""}</td>
                    <td>${c.firstName ?? ""}</td>
                    <td>${c.lastName ?? ""}</td>
                    <td>${c.email ?? ""}</td>
                    <td>${c.phoneNumber ?? ""}</td>
                </tr>
            `).join("");

            customersWrap.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>First name</th>
                            <th>Last name</th>
                            <th>Email</th>
                            <th>Phone</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        } catch (e) {
            console.error(e);
            customersWrap.innerHTML = "<p class='error show'>Network error.</p>";
        }
    });

    // Remove customer
    const removeMsg = document.getElementById("removeMsg");
    document.getElementById("btnRemoveCustomer").addEventListener("click", async () => {
        removeMsg.textContent = "";
        const idVal = document.getElementById("removeCustomerId").value.trim();
        if (!idVal) {
            removeMsg.textContent = "Enter a user ID.";
            return;
        }
        try {
            const res = await fetch("/admin/remove_customer", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ userId: Number(idVal) })
            });
            const json = await res.json().catch(() => null);
            if (res.ok && json && json.status === "success") {
                removeMsg.textContent = "Customer removed.";
            } else {
                removeMsg.textContent = (json && json.message) || "Failed to remove.";
            }
        } catch (e) {
            console.error(e);
            removeMsg.textContent = "Network error.";
        }
    });

    // Create teller
    const createMsg = document.getElementById("createTellerMsg");
    document.getElementById("btnCreateTeller").addEventListener("click", async () => {
        createMsg.textContent = "";
        const email = document.getElementById("newTellerEmail").value.trim();
        const password = document.getElementById("newTellerPassword").value.trim();
        const branchName = document.getElementById("newTellerBranch").value.trim();

        if (!email || !password) {
            createMsg.textContent = "Email and password are required.";
            return;
        }

        const payload = { email, password };
        if (branchName) payload.branchName = branchName;

        try {
            const res = await fetch("/admin/create_teller", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify(payload)
            });
            const json = await res.json().catch(() => null);

            if (res.ok && json && json.status === "success") {
                createMsg.textContent = "Teller created (ID " + (json.data?.userId ?? "?") + ").";
            } else {
                createMsg.textContent = (json && json.message) || "Failed to create teller.";
            }
        } catch (e) {
            console.error(e);
            createMsg.textContent = "Network error.";
        }
    });
});
</script>
</body>
</html>
